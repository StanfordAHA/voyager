test-accelerator:
  stage: test
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
  artifacts:
    paths:
      - ./test_outputs
    expire_in: 1 week
  script: 
    - echo "Generating test data."
    - pip install -r ./models/resnet/requirements.txt
    - ./models/resnet/gen_resnet_data.py
    - echo "Running accelerator tests."
    - export LD_LIBRARY_PATH=/cad/mentor/2021.1/Mgc_home/shared/lib/
    - make -j TestRunner
    - ./run_tests.py

test-posit:
  stage: test
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
  script: 
    - echo "Running posit tests."
    - make PositTest
    - ./build/PositTest
