include: .gitlab/ci/template.yml

Accuracy (FP32, ResNet18, ImageNet):
  extends: .on_merge_request
  script:
    - DATATYPE=CFLOAT IC_DIMENSION=16 OC_DIMENSION=16 python3 run_regression.py --models resnet18 --dataset imagenet --sims accuracy --num_processes 32

