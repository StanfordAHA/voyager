include: .gitlab/ci/template.yml

SystemC Simulation (E4M3, 32x64):
  extends: .regression_template
  script:
    - DATATYPE=E4M3 IC_DIMENSION=32 OC_DIMENSION=64 CLOCK_PERIOD=5 python3 run_regression.py --models resnet18,resnet50 --sims fast-systemc --num_processes 32

