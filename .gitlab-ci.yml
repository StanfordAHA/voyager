# MINOTAUR CI

stages:
  - test

#############################
### ResNet Layer by Layer ###
#############################

ResNet Layers (Accel vs. Pytorch):
  stage: test
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
  artifacts:
    when: always
    paths:
      - ./test_outputs
    expire_in: 1 week
  script:
    - echo "Generating test data."
    # - python3 -m venv venv
    # - . ./venv/bin/activate
    # - pip install -r ./models/resnet/requirements.txt
    - python3 models/resnet/gen_resnet_data.py
    - echo "Running tests."
    - export LD_LIBRARY_PATH=/cad/mentor/2021.1/Mgc_home/shared/lib/
    - python3 run_tests.py --simulators accelerator,file --tolerance 12.0

