include: .gitlab/ci/template.yml

RTL Simulation (E4M3, 32x64):
  extends: .on_merge_request
  script:
    - DATATYPE=E4M3 IC_DIMENSION=32 OC_DIMENSION=64 TECHNOLOGY=generic CLOCK_PERIOD=5 python3 run_regression.py --models resnet18,resnet50 --sims rtl --num_processes 32

