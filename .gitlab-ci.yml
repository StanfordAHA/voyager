# MINOTAUR CI 

# We are using three runners on "rsgvm9". 
# They can be configured using "/etc/gitlab-runner/config.toml".
# The working-dir of the runners is "/pool0/minotaur-ci".

stages:
  - init
  # - build
  - test

init:
  stage: init
  script:
    - echo "MINOTAUR GitLab CI starting!"
    - date
    - pwd

