#########################################
### MobileBERT Codegen Layer by Layer ###
#########################################

MobileBERT Codegen Layers (FP32 Gold Model vs. Pytorch):
  stage: test
  artifacts:
    when: always
    paths:
      - ./test_outputs
    expire_in: 1 week
  script:
    - (cd zagzig/proto && ./gen.sh)
    - export LD_LIBRARY_PATH=/cad/mentor/2021.1/Mgc_home/shared/lib/
    - python3 run_tests.py --model mobilebert_codegen --data_dir test/mobilebert/gen_data/ --simulators fp32,file --tolerance 0.01

MobileBERT Codegen Layers (Accel vs. Posit Gold Model):
  stage: test
  artifacts:
    when: always
    paths:
      - ./test_outputs
    expire_in: 1 week
  script:
    - (cd zagzig/proto && ./gen.sh)
    - export LD_LIBRARY_PATH=/cad/mentor/2021.1/Mgc_home/shared/lib/
    - python3 run_tests.py --model mobilebert_codegen --data_dir test/mobilebert/gen_data/ --simulators accelerator,customposit --tolerance 0.01

####################################
### MobileBERT Codegen End 2 End ###
####################################

MobileBERT Codegen End2End (FP32 Gold Model vs. Pytorch):
  stage: test
  artifacts:
    when: always
    paths:
      - ./test_outputs
    expire_in: 1 week
  script:
    - (cd zagzig/proto && ./gen.sh)
    - export LD_LIBRARY_PATH=/cad/mentor/2021.1/Mgc_home/shared/lib/
    - mkdir ./test_outputs
    - make -j8 clean TestRunner
    - make TestRunner
    - DATA_DIR=test/mobilebert/gen_data/ TOLERANCE=0.01 NETWORK=mobilebert_codegen TESTS=mobilebert_encoder_layer_0_attention_self_value_MatMul,mobilebert_pooler_Gather SIMS=fp32,file ./build/TestRunner

MobileBERT Codegen End2End (Accel vs. Posit Gold Model):
  stage: test
  artifacts:
    when: always
    paths:
      - ./test_outputs
    expire_in: 1 week
  script:
    - (cd zagzig/proto && ./gen.sh)
    - export LD_LIBRARY_PATH=/cad/mentor/2021.1/Mgc_home/shared/lib/
    - mkdir ./test_outputs
    - make -j8 clean TestRunner
    - make TestRunner
    - DATA_DIR=test/mobilebert/gen_data/ TOLERANCE=0.01 NETWORK=mobilebert_codegen TESTS=mobilebert_encoder_layer_0_attention_self_value_MatMul,mobilebert_pooler_Gather SIMS=customposit,accelerator ./build/TestRunner
