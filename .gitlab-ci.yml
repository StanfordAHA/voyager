# MINOTAUR CI 

# We are using runners on "rsgvm9". 
# They can be configured using "/etc/gitlab-runner/config.toml".
# The working-dir of runners is "/home/gitlab-runner/builds".

stages:
  - init
  # - build
  - test

init:
  stage: init
  script:
    - echo "MINOTAUR GitLab CI starting!"
    - date
    - pwd

