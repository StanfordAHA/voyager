# MINOTAUR CI 

stages:
  - test

ResNet Layers (Accel vs. Pytorch):
  stage: test
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
  artifacts:
    when: always
    paths:
      - ./test_outputs
    expire_in: 1 week
  script: 
    - echo "Generating test data."
    - pip install -r ./models/resnet/requirements.txt
    - ./models/resnet/gen_resnet_data.py
    - echo "Running tests."
    - export LD_LIBRARY_PATH=/cad/mentor/2021.1/Mgc_home/shared/lib/
    - ./run_tests.py --simulators accelerator,file --tolerance 10.0

