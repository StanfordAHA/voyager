RTL Simulation (E4M3, 16x16):
  stage: test
  artifacts:
    when: always
    paths:
      - ./regression_results
    expire_in: 1 month
  script:
    - DATATYPE=E4M3 IC_DIMENSION=16 OC_DIMENSION=16 TECHNOLOGY=generic CLOCK_PERIOD=5 python3 run_regression.py --models resnet18,mobilebert --sims RTL --num_processes 32

