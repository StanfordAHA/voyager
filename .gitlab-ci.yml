End2End_ResNet_FP32-vs-File:
  stage: test
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
  artifacts:
    when: always
    paths:
      - ./test_outputs
    expire_in: 1 week
  script:
    - echo "Generating test data."
    - pip install -r ./models/resnet/requirements.txt
    - ./models/resnet/gen_resnet_data.py
    - echo "Running tests."
    - export LD_LIBRARY_PATH=/cad/mentor/2021.1/Mgc_home/shared/lib/
    - mkdir ./test_outputs
    - make -j8 clean TestRunner
    - make TestRunner
    - MODEL=resnet TESTS=conv1,fc SIMS=fp32,file ./build/TestRunner

