### MobileBERT Codegen End 2 End ###
####################################

MobileBERT Codegen End2End (FP32 Gold Model vs. Pytorch):
  stage: test
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
    GIT_SUBMODULE_DEPTH: 3
  artifacts:
    when: always
    paths:
      - ./test_outputs
    expire_in: 1 week
  script:
    # - python3 -m venv venv
    # - . ./venv/bin/activate
    # - pip3 install -r zagzig/requirements.txt
    # - pip3 install -r requirements.txt
    - (cd zagzig/proto && ./gen.sh)
    - (cd zagzig && python3 run_zagzig.py --data_dir /pool0/fpedd/su/imagenet/val_1k --frontend naive_transformer --no_preprocess --model_path zagzig/models/onnx/mobilebert.onnx)
    - export LD_LIBRARY_PATH=/cad/mentor/2021.1/Mgc_home/shared/lib/
    - mkdir ./test_outputs
    - make -j8 clean TestRunner
    - make TestRunner
    - DATA_DIR=test/mobilebert/gen_data/ TOLERANCE=0.01 NETWORK=mobilebert_codegen TESTS=attention_self_value_MatMul,output_bottleneck_LayerNorm_Mul SIMS=fp32,file ./build/TestRunner

