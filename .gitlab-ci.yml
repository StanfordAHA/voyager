# MINOTAUR CI
stages:
  - test

before_script:
  - eval `modulecmd bash load base catapult/2022.2 vcs/T-2022.06-SP2 verdi/S-2021.09-SP1`
  - export VG_GNU_PACKAGE=/cad/synopsys/vcs_gnu_package/S-2021.09/gnu_9/linux
  - source /cad/synopsys/vcs_gnu_package/S-2021.09/gnu_9/linux/source_me.sh
  - export LD_LIBRARY_PATH=/cad/mentor/2024.1/Mgc_home/lib:/cad/mentor/2024.1/Mgc_home/shared/lib:$LD_LIBRARY_PATH
  - export PATH=/home/gitlab-runner/miniforge3/bin:$PATH
  - conda init bash
  - source ~/.bashrc
  - conda activate /sim/gitlab-runner/envs/accelerator-env
  - pip install -e quantized-training
  - pip install graphviz
  - export PROJECT_ROOT=`pwd`

variables:
  GIT_SUBMODULE_STRATEGY: recursive
  GIT_SUBMODULE_DEPTH: 3
  GIT_CLEAN_FLAGS: -ffdx

include:
  # - local: .gitlab/ci/sysc.yml
  - local: .gitlab/ci/rtl.yml
