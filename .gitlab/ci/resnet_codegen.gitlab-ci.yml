#####################################
### ResNet Codegen Layer by Layer ###
#####################################

ResNet Codegen Layers (FP32 Gold Model vs. Pytorch):
  stage: test
  artifacts:
    when: always
    paths:
      - ./test_outputs
    expire_in: 1 week
  script:
    - (cd zagzig && python3 run_zagzig.py --data_dir data/imagenet --model_path zagzig/models/onnx/resnet18.onnx --frontend zigzag)
    - python3 run_tests.py --model resnet18_codegen --data_dir test/resnet/gen_data/ --simulators fp32,file --tolerance 0.01 --test_type layerbylayer

ResNet Codegen Layers (Accel vs. Posit Gold Model):
  stage: test
  artifacts:
    when: always
    paths:
      - ./test_outputs
    expire_in: 1 week
  script:
    - (cd zagzig && python3 run_zagzig.py --data_dir data/imagenet --model_path zagzig/models/onnx/resnet18.onnx --frontend zigzag)
    - python3 run_tests.py --model resnet18_codegen --data_dir test/resnet/gen_data/ --simulators accelerator,customposit --tolerance 0.01 --test_type layerbylayer

