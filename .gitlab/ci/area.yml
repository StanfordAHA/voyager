.pd_setup: &pd_setup
 - (cd physical-design/technology/adks && ln -s /home/shared/MINOTAUR/adks/tsmc40ulp_V130a_8lm5X1Z1U)

Area (ProcessingElement, FP32, TSMC40, 5):
  stage: test
  artifacts:
    when: always
    paths:
      - physical-design/ProcessingElement/build/ProcessingElement.mapped.area.rpt
    expire_in: 1 month
  script:
    - *pd_setup
    - cd physical-design/ProcessingElement
    - ./build.xsh --technology tsmc40 --clock 5 --datatype FP32 --dir build
    - cd build && make

