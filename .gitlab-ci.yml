# TODO(fpedd): Reduce tolerance in "ResNet Accuracy (Pytorch vs. FP32 Gold Model)" and "ResNet Accuracy (Posit Gold Model vs. Accel)"
ResNet Accuracy (Pytorch vs. FP32 Gold Model):
  stage: test
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
  artifacts:
    when: always
    paths:
      - ./test_outputs_e2e
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
  script:
    - echo "Generating test data."
    # - python3 -m venv venv
    # - . ./venv/bin/activate
    # - pip install -r ./models/resnet/requirements.txt
    - python3 models/resnet/gen_resnet_data.py --binary_dir models/resnet/binary_data_imagenet --samples 256
    - echo "Running tests."
    - export LD_LIBRARY_PATH=/cad/mentor/2021.1/Mgc_home/shared/lib/
    - python3 run_tests_e2e.py -sims file,fp32 --samples 256 --data_dir models/resnet/binary_data_imagenet --tolerance 1.0 --accuracy_tolerance 0.65

