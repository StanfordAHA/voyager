SystemC Simulation (E4M3, 16x16):
  stage: test
  artifacts:
    when: always
    paths:
      - ./regression_results
    expire_in: 1 month
  script:
    - DATATYPE=E4M3 DIMENSION=16 python3 run_regression.py --models resnet18,mobilebert --sims SystemC --num_processes 32

SystemC Simulation (E4M3, 32x32):
  stage: test
  artifacts:
    when: always
    paths:
      - ./regression_results
    expire_in: 1 month
  script:
    - DATATYPE=E4M3 DIMENSION=32 python3 run_regression.py --models resnet18,mobilebert --sims SystemC --num_processes 32