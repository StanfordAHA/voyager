Setup Conda:
  stage: setup
  tags:
    - conda
  before_script:
    - export PATH=$HOME/miniforge3/condabin:$PATH
    - source $(conda info --base)/etc/profile.d/conda.sh
  script:
    - conda env create -n ci-env-$CI_PIPELINE_ID -f $(pwd)/environment.yml
    - conda activate ci-env-$CI_PIPELINE_ID
  rules:
    - when: always
