Accuracy (E4M3, ResNet18, ImageNet):
  stage: test
  artifacts:
    when: always
    paths:
      - ./regression_results
    expire_in: 1 month
  script:
    - DATATYPE=E4M3 IC_DIMENSION=16 OC_DIMENSION=16 python3 run_regression.py --models resnet18 --dataset imagenet --sims accuracy --num_processes 32

