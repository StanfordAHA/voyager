Accuracy (E4M3, mobilebert, SST2):
  stage: test
  artifacts:
    when: always
    paths:
      - ./regression_results
    expire_in: 1 month
  script:
    - DATATYPE=E4M3 IC_DIMENSION=16 OC_DIMENSION=16 python3 run_regression.py --models mobilebert --dataset sst2 --sims Accuracy --num_processes 32

