###############################
### ResNet Codegen Accuracy ###
###############################

ResNet Codegen Accuracy (FP32 Gold Model and Pytorch):
  stage: test
  artifacts:
    when: always
    paths:
      - ./test_outputs
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
  script:
    - (cd zagzig && python3 run_zagzig.py --data_dir data/imagenet --model_path zagzig/models/onnx/resnet18.onnx --frontend zigzag --samples 256)
    - python3 run_tests.py --model resnet18_codegen --data_dir test/resnet/gen_data/ --simulators fp32,file --tolerance 0.01 --test_type accuracy --accuracy_tolerance 0.64

ResNet Codegen Accuracy (Accel and Posit Gold Model):
  stage: test
  artifacts:
    when: always
    paths:
      - ./test_outputs
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
  script:
    - (cd zagzig && python3 run_zagzig.py --data_dir data/imagenet --model_path zagzig/models/onnx/resnet18.onnx --frontend zigzag --samples 128)
    - python3 run_tests.py --model resnet18_codegen --data_dir test/resnet/gen_data/ --simulators accelerator,customposit --tolerance 0.01 --test_type accuracy --accuracy_tolerance 0.63
